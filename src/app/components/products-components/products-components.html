<div class="product">
  <div class="product-image">
    <img src="images/{{ product.image }}" alt="Macaroon {{ i + 1 }}" />
  </div>
  <div class="product-tittle">{{ product.title }}</div>
  <div class="product-info">
    <div class="product-text">
      <div class="product-info-quantity">{{ product.quantity }}</div>
      <div class="product-info-price">
        {{ product.price | currency: 'руб' : 'руб' : '1.2-2' : 'ru-RU' }}
      </div>
    </div>
    <div class="product-action">
      <button class="button btn-product" (click)="addProductToCart()" btnBg>Заказать</button>
    </div>
  </div>
</div>
